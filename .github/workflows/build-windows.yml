name: Build Windows Executable

on:
  workflow_dispatch: # <--- ESTO PERMITE EJECUTARLO A MANO DESDE LA WEB
  push:
    tags:
      - 'v*' # <--- ESTO SE EJECUTA SOLO SI HACES UN TAG (ej: git push v1.0.0)

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run build script
        run: python build-windows.py

      # NUEVO: Crear un archivo .zip con la carpeta generada
      - name: Zip the output
        run: Compress-Archive -Path release/Desk/* -DestinationPath Desk-Windows.zip
        shell: pwsh

      # NUEVO: Si lo ejecutaste a mano, lo sube como "Artifact" temporal (expira en 90 días)
      - name: Upload Development Artifact
        if: startsWith(github.ref, 'refs/tags/') == false
        uses: actions/upload-artifact@v4
        with:
          name: Desk-Windows-Dev
          path: Desk-Windows.zip

      # NUEVO: Si es un Tag (versión oficial), lo publica en la sección "Releases" para siempre
      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Desk-Windows.zip