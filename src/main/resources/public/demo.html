
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FARO - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --brand-primary: #06B6D4;
            --brand-accent: #0EA5E9;

            --dark-bg: #090E1E;
            
            
            --dark-sidebar: #0E1828;
            --dark-navbar: rgba(17, 24, 39, 0.6);
            --dark-card: rgba(22, 38, 59, 0.4);
            --dark-card: rgba(22, 38, 59, 0.1);
            
            --dark-card-border: rgba(255,255,255,0.06);
            --dark-text: #F0F9FF;
            --dark-text-secondary: #7DD3FC;
            --dark-text-muted: #475569;
            --dark-nav-item: rgba(255,255,255,0.45);
            --dark-nav-active-bg: rgba(6,182,212,0.12);
            --dark-nav-active-text: #F0F9FF;
            --dark-nav-sub: rgba(255,255,255,0.35);
            --dark-row-hover: rgba(255,255,255,0.03);
            --dark-input-bg: rgba(255,255,255,0.03);
            --primary: var(--brand-primary);
        }

        [data-theme="light"] {
            --dark-bg: #F0F4F8;
            
            
            --dark-sidebar: #0C4A6E;
            --dark-navbar: rgba(255,255,255,0.6);
            --dark-card: rgba(255,255,255,0.75);
            --dark-card-border: rgba(0,0,0,0.05);
            --dark-text: #082F49;
            --dark-text-secondary: #0369A1;
            --dark-text-muted: #94A3B8;
            --dark-nav-item: rgba(255,255,255,0.6);
            --dark-nav-active-bg: rgba(255,255,255,0.12);
            --dark-nav-active-text: #FFFFFF;
            --dark-nav-sub: rgba(255,255,255,0.45);
            --dark-row-hover: rgba(0,0,0,0.02);
            --dark-input-bg: rgba(0,0,0,0.03);
            --primary: #0284C7;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg);
            color: var(--dark-text);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body::before, body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(100px);
            opacity: 1;
            transition: opacity 0.3s ease;
        }
        body::before { width: 500px; height: 500px; background: rgba(6,182,212,0.07); top: -80px; left: -40px; }
        body::after { width: 420px; height: 420px; background: rgba(14,165,233,0.05); bottom: -80px; right: -40px; }
        [data-theme="light"] body::before,
        [data-theme="light"] body::after { opacity: 0; }

        .app-layout {
            display: flex;
            min-height: 100vh;
            padding: 12px;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        /* ═══════════════════════════════════════
           SIDEBAR
           ═══════════════════════════════════════ */
        .sidebar {
            width: 260px;
            background: var(--dark-sidebar);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 12px; top: 12px; bottom: 12px;
            z-index: 100;
            transition: background 0.3s ease, transform 0.25s ease;
            border: 1px solid var(--dark-card-border);
            overflow: hidden;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 24px 20px;
            flex-shrink: 0;
        }

        .sidebar-brand-icon {
            width: 36px; height: 36px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            color: white;
            flex-shrink: 0;
        }

        .sidebar-brand-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--dark-text);
            letter-spacing: -0.5px;
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 0 10px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .sidebar-nav::-webkit-scrollbar { width: 0; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            color: var(--dark-nav-item);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: color 0.2s ease, background 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .wave-ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(6,182,212,0.35) 0%, rgba(6,182,212,0.1) 50%, transparent 70%);
            transform: scale(0);
            pointer-events: none;
            animation: wave-ripple-anim 0.6s ease-out forwards;
        }

        @keyframes wave-ripple-anim {
            0% { transform: scale(0); opacity: 0.7; }
            100% { transform: scale(4); opacity: 0; }
        }

        .nav-item:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.04); }
        .nav-item.active { color: var(--dark-nav-active-text); background: var(--dark-nav-active-bg); }
        .nav-item.active .nav-icon { color: var(--primary); }

        .nav-icon {
            width: 20px;
            text-align: center;
            font-size: 1rem;
            flex-shrink: 0;
            transition: color 0.2s ease;
        }

        .nav-label { flex: 1; white-space: nowrap; }

        .nav-chevron {
            font-size: 10px;
            opacity: 0.4;
            transition: transform 0.25s ease, opacity 0.2s ease;
            flex-shrink: 0;
        }
        .nav-item.expanded .nav-chevron { transform: rotate(180deg); opacity: 0.6; }

        .nav-sub {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s cubic-bezier(0.4,0,0.2,1);
            padding-left: 18px;
        }
        .nav-sub.open { max-height: 200px; }

        .nav-sub-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-radius: 10px;
            color: var(--dark-nav-sub);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 400;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: color 0.2s ease, background 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-sub-item .wave-ripple {
            background: radial-gradient(circle, rgba(6,182,212,0.3) 0%, rgba(6,182,212,0.08) 50%, transparent 70%);
        }

        .nav-sub-item:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.03); }
        .nav-sub-item.active { color: var(--dark-nav-active-text); background: var(--dark-nav-active-bg); }

        .nav-sub-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.4;
            flex-shrink: 0;
            transition: opacity 0.2s ease, box-shadow 0.2s ease;
        }

        .nav-sub-item.active .nav-sub-dot {
            opacity: 1;
            background: var(--primary);
            box-shadow: 0 0 6px rgba(6,182,212,0.4);
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--dark-card-border);
            flex-shrink: 0;
        }

        .sidebar-user { display: flex; align-items: center; gap: 12px; }

        .sidebar-user-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.875rem;
            flex-shrink: 0;
        }

        .sidebar-user-info { flex: 1; min-width: 0; }
        .sidebar-user-name { font-size: 0.875rem; font-weight: 600; color: var(--dark-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-user-email { font-size: 0.75rem; color: var(--dark-text-secondary); opacity: 0.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .sidebar-footer-actions { display: flex; gap: 4px; flex-shrink: 0; }

        .sidebar-icon-btn {
            width: 32px; height: 32px;
            border-radius: 10px;
            border: none;
            background: none;
            color: var(--dark-nav-sub);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            transition: color 0.2s ease, background 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .sidebar-icon-btn .wave-ripple {
            background: radial-gradient(circle, rgba(6,182,212,0.3) 0%, transparent 70%);
        }

        .sidebar-icon-btn:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.06); }

        /* ═══════════════════════════════════════
           CONTENT AREA
           ═══════════════════════════════════════ */
        .content-area {
            flex: 1;
            margin-left: 272px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ═══════════════════════════════════════
           NAVBAR
           ═══════════════════════════════════════ */
        .navbar {
            height: 64px;
            background: var(--dark-navbar);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--dark-card-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            transition: background 0.3s ease;
        }

        .navbar-left { display: flex; align-items: center; gap: 12px; }

        .menu-toggle {
            display: none;
            width: 40px; height: 40px;
            border-radius: 12px;
            border: 1px solid var(--dark-card-border);
            background: var(--dark-card);
            color: var(--dark-text-secondary);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.2s ease;
        }
        .menu-toggle:hover { border-color: var(--primary); color: var(--primary); }

        .navbar-title { font-size: 1.125rem; font-weight: 600; color: var(--dark-text); }
        .navbar-actions { display: flex; align-items: center; gap: 12px; }

        .navbar-search { position: relative; }

        .navbar-search input {
            width: 240px;
            padding: 9px 16px 9px 40px;
            border-radius: 12px;
            border: 1px solid var(--dark-card-border);
            background: var(--dark-input-bg);
            color: var(--dark-text);
            font-size: 0.875rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.2s ease;
        }

        .navbar-search input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(6,182,212,0.1);
            width: 300px;
        }

        .navbar-search input::placeholder { color: var(--dark-text-muted); }

        .navbar-search i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--dark-text-muted);
            font-size: 0.8rem;
            pointer-events: none;
        }

        .navbar-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 1px solid var(--dark-card-border);
            background: var(--dark-input-bg);
            color: var(--dark-text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            position: relative;
        }
        .navbar-btn:hover { background: rgba(255,255,255,0.06); color: var(--dark-text); border-color: var(--primary); }

        .navbar-btn .badge {
            position: absolute;
            top: -2px; right: -2px;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: #F43F5E;
            color: white;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--dark-navbar);
        }

        .navbar-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: box-shadow 0.2s ease;
        }
        .navbar-avatar:hover { box-shadow: 0 0 0 3px rgba(6,182,212,0.2); }

        /* ═══════════════════════════════════════
           MAIN
           ═══════════════════════════════════════ */
        .main {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: var(--dark-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--dark-card-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.06);
            transition: background 0.3s ease;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 16px;
        }

        .toolbar-filters { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--dark-card-border);
            background: var(--dark-input-bg);
            color: var(--dark-nav-item);
            transition: all 0.2s ease;
        }
        .filter-chip:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); }

        .filter-chip.active {
            background: var(--dark-nav-active-bg);
            border-color: rgba(6,182,212,0.25);
            color: var(--dark-nav-active-text);
        }

        .filter-chip .count {
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 50px;
            background: rgba(255,255,255,0.06);
        }
        .filter-chip.active .count { background: rgba(6,182,212,0.2); }

        .toolbar-right { display: flex; align-items: center; gap: 8px; }

        .btn-ghost {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 14px;
            border: 1px solid var(--dark-card-border);
            background: var(--dark-input-bg);
            color: var(--dark-text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.06); color: var(--dark-text); border-color: rgba(6,182,212,0.25); }

        .btn-add {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(6,182,212,0.25);
            position: relative;
            overflow: hidden;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-add .wave-ripple { background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%); }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(6,182,212,0.4); }

        /* Tabla */
        .table-card {
            background: var(--dark-card);
            backdrop-filter: blur(20px) saturate(1.6);
            -webkit-backdrop-filter: blur(20px) saturate(1.6);
            border: 1px solid var(--dark-card-border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .data-table { width: 100%; border-collapse: collapse; }

        .data-table thead th {
            padding: 16px 24px;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--dark-text-muted);
            border-bottom: 1px solid var(--dark-card-border);
            background: rgba(255,255,255,0.02);
        }

        .data-table tbody tr {
            transition: background 0.2s ease;
            border-bottom: 1px solid var(--dark-card-border);
        }
        .data-table tbody tr:hover { background: var(--dark-row-hover); }
        .data-table tbody tr:last-child { border-bottom: none; }

        .data-table tbody td {
            padding: 18px 24px;
            font-size: 0.875rem;
            color: var(--dark-text);
            vertical-align: middle;
        }

        .product-info { display: flex; flex-direction: column; gap: 2px; }
        .product-name { font-weight: 600; color: var(--dark-text); }
        .product-sku { font-size: 0.75rem; color: var(--dark-text-muted); }

        .price { font-weight: 600; font-variant-numeric: tabular-nums; }

        .stock-bar { display: flex; align-items: center; gap: 10px; }
        .stock-bar-track { width: 60px; height: 4px; border-radius: 50px; background: rgba(255,255,255,0.06); overflow: hidden; }
        .stock-bar-fill { height: 100%; border-radius: 50px; transition: width 0.6s ease; }
        .stock-bar-fill.high { background: #22C55E; }
        .stock-bar-fill.mid { background: #F59E0B; }
        .stock-bar-fill.low { background: #F43F5E; }
        .stock-num { font-size: 0.75rem; color: var(--dark-text-muted); min-width: 24px; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; }

        .status-active { background: rgba(34,197,94,0.1); color: #22C55E; }
        .status-active::before { background: #22C55E; box-shadow: 0 0 6px rgba(34,197,94,0.4); }

        .status-low { background: rgba(245,158,11,0.1); color: #F59E0B; }
        .status-low::before { background: #F59E0B; box-shadow: 0 0 6px rgba(245,158,11,0.4); }

        .status-out { background: rgba(244,63,94,0.1); color: #F43F5E; }
        .status-out::before { background: #F43F5E; box-shadow: 0 0 6px rgba(244,63,94,0.4); }

        .row-actions { display: flex; gap: 4px; justify-content: flex-end; }
        .row-action-btn {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: none;
            background: none;
            color: var(--dark-text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }
        .row-action-btn:hover { color: var(--primary); background: rgba(6,182,212,0.08); }

        /* Paginación */
        .pagination-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-top: 16px;
            padding: 14px 24px;
            background: var(--dark-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--dark-card-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .pagination-info { font-size: 0.875rem; color: var(--dark-text-muted); }
        .pagination-info span { color: var(--dark-text); font-weight: 600; }

        .pagination { display: flex; align-items: center; gap: 4px; }

        .page-btn {
            min-width: 36px; height: 36px;
            padding: 0 10px;
            border-radius: 10px;
            border: 1px solid var(--dark-card-border);
            background: var(--dark-input-bg);
            color: var(--dark-text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .page-btn:hover { background: rgba(255,255,255,0.06); color: var(--dark-text); border-color: var(--primary); }
        .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(6,182,212,0.3); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .page-btn:disabled:hover { background: var(--dark-input-bg); color: var(--dark-text-secondary); border-color: var(--dark-card-border); }

        .page-size-select { display: flex; align-items: center; gap: 8px; font-size: 0.875rem; color: var(--dark-text-muted); }
        .page-size-select select {
            padding: 6px 10px;
            border-radius: 10px;
            border: 1px solid var(--dark-card-border);
            background: var(--dark-input-bg);
            color: var(--dark-text);
            font-size: 0.875rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s ease;
        }
        .page-size-select select:focus { border-color: var(--primary); }

        /* Animaciones */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeInUp 0.5s ease forwards; }
        .delay-1 { animation-delay: 0.08s; opacity: 0; }
        .delay-2 { animation-delay: 0.14s; opacity: 0; }
        .delay-3 { animation-delay: 0.20s; opacity: 0; }

        @keyframes rowIn {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .row-anim { animation: rowIn 0.35s ease forwards; opacity: 0; }

        .sidebar-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 99;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .sidebar-overlay.visible { opacity: 1; }

        .toast {
            padding: 12px 20px;
            background: var(--dark-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--dark-card-border);
            border-left: 3px solid var(--primary);
            border-radius: 16px;
            color: var(--dark-text);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: translateX(120%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease;
            opacity: 0;
        }

        @media (max-width: 1100px) {
            .data-table { display: block; overflow-x: auto; }
        }

        @media (max-width: 768px) {
            .app-layout { padding: 8px; gap: 8px; }
            .sidebar { transform: translateX(-100%); left: 8px; top: 8px; bottom: 8px; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay { display: block; }
            .menu-toggle { display: flex; }
            .content-area { margin-left: 0; }
            .main { padding: 16px; border-radius: 16px; }
            .navbar-search input { width: 140px; }
            .navbar-search input:focus { width: 180px; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .toolbar-filters { justify-content: flex-start; }
            .toolbar-right { width: 100%; }
            .btn-ghost { flex: 1; justify-content: center; }
            .btn-add { flex: 1; justify-content: center; }
            .pagination-card { flex-direction: column; gap: 12px; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 50px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body data-theme="dark">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-brand-icon"><i class="fas fa-lightbulb"></i></div>
                <span class="sidebar-brand-text">FARO</span>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" onclick="navTo(this, event)">
                    <i class="fas fa-th-large nav-icon"></i>
                    <span class="nav-label">Inicio</span>
                </a>

                <button class="nav-item expanded" onclick="toggleSub(this)">
                    <i class="fas fa-box nav-icon"></i>
                    <span class="nav-label">Inventario</span>
                    <i class="fas fa-chevron-down nav-chevron"></i>
                </button>
                <div class="nav-sub open">
                    <a href="#" class="nav-sub-item active" onclick="navTo(this, event)"><span class="nav-sub-dot"></span><span>Productos</span></a>
                    <a href="#" class="nav-sub-item" onclick="navTo(this, event)"><span class="nav-sub-dot"></span><span>Categorias</span></a>
                    <a href="#" class="nav-sub-item" onclick="navTo(this, event)"><span class="nav-sub-dot"></span><span>Proveedores</span></a>
                </div>

                <button class="nav-item" onclick="toggleSub(this)">
                    <i class="fas fa-store nav-icon"></i>
                    <span class="nav-label">Comercial</span>
                    <i class="fas fa-chevron-down nav-chevron"></i>
                </button>
                <div class="nav-sub">
                    <a href="#" class="nav-sub-item" onclick="navTo(this, event)"><span class="nav-sub-dot"></span><span>Ventas</span></a>
                    <a href="#" class="nav-sub-item" onclick="navTo(this, event)"><span class="nav-sub-dot"></span><span>Clientes</span></a>
                    <a href="#" class="nav-sub-item" onclick="navTo(this, event)"><span class="nav-sub-dot"></span><span>Facturacion</span></a>
                </div>

                <a href="#" class="nav-item" onclick="navTo(this, event)">
                    <i class="fas fa-chart-bar nav-icon"></i>
                    <span class="nav-label">Reportes</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="sidebar-user-avatar">A</div>
                    <div class="sidebar-user-info">
                        <div class="sidebar-user-name">Admin</div>
                        <div class="sidebar-user-email">admin@faro.com</div>
                    </div>
                    <div class="sidebar-footer-actions">
                        <button class="sidebar-icon-btn" onclick="toggleTheme()" title="Cambiar tema"><i class="fas fa-moon" id="theme-icon"></i></button>
                        <button class="sidebar-icon-btn" onclick="showToast('Sesion cerrada')" title="Cerrar sesion"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </div>
            </div>
        </aside>

        <div class="content-area">
            <header class="navbar">
                <div class="navbar-left">
                    <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <h1 class="navbar-title" id="navbarTitle">Productos</h1>
                </div>
                <div class="navbar-actions">
                    <div class="navbar-search">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Buscar...">
                    </div>
                    <button class="navbar-btn"><i class="fas fa-bell"></i><span class="badge">3</span></button>
                    <button class="navbar-btn"><i class="fas fa-cog"></i></button>
                    <div class="navbar-avatar">A</div>
                </div>
            </header>

            <main class="main">
                <div class="toolbar animate-fade-in delay-1">
                    <div class="toolbar-filters">
                        <button class="filter-chip active" onclick="setFilter(this)">Todos <span class="count">342</span></button>
                        <button class="filter-chip" onclick="setFilter(this)">Activos <span class="count">298</span></button>
                        <button class="filter-chip" onclick="setFilter(this)">Stock bajo <span class="count">32</span></button>
                        <button class="filter-chip" onclick="setFilter(this)">Sin stock <span class="count">12</span></button>
                    </div>
                    <div class="toolbar-right">
                        <button class="btn-ghost" onclick="showToast('Exportando...')"><i class="fas fa-file-export"></i> Exportar</button>
                        <button class="btn-add" onclick="showToast('Nuevo producto')"><i class="fas fa-plus"></i> Nuevo producto</button>
                    </div>
                </div>

                <div class="table-card animate-fade-in delay-2">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Estado</th>
                                <th>Categoria</th>
                                <th style="text-align:right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>

                <div class="pagination-card animate-fade-in delay-3">
                    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
                        <span class="pagination-info" id="paginationInfo">Mostrando <span>1-8</span> de <span>342</span></span>
                        <div class="page-size-select">
                            <span>Por pagina:</span>
                            <select id="pageSize" onchange="changePageSize()">
                                <option value="8" selected>8</option>
                                <option value="15">15</option>
                                <option value="30">30</option>
                            </select>
                        </div>
                    </div>
                    <div class="pagination" id="pagination"></div>
                </div>
            </main>
        </div>
    </div>

    <div id="toastContainer" style="position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;"></div>

    <script>
        function createWaveRipple(e, element) {
            const rect = element.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const size = Math.max(rect.width, rect.height) * 1.2;
            const ripple = document.createElement('div');
            ripple.className = 'wave-ripple';
            ripple.style.width = size + 'px';
            ripple.style.height = size + 'px';
            ripple.style.left = (x - size / 2) + 'px';
            ripple.style.top = (y - size / 2) + 'px';
            element.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        document.querySelectorAll('.nav-item, .nav-sub-item, .sidebar-icon-btn, .btn-add').forEach(el => {
            el.addEventListener('click', function(e) { createWaveRipple(e, this); });
        });

        const products = [
            { name: 'Laptop Pro X', sku: 'LPT-001', price: 4250000, stock: 45, max: 100, cat: 'Electronica' },
            { name: 'Smartphone Galaxy S24', sku: 'SMP-012', price: 3200000, stock: 3, max: 80, cat: 'Electronica' },
            { name: 'Auriculares Bluetooth', sku: 'AUD-007', price: 250000, stock: 120, max: 200, cat: 'Accesorios' },
            { name: 'Smart TV 55"', sku: 'TV-003', price: 5800000, stock: 0, max: 30, cat: 'Electronica' },
            { name: 'Teclado Mecanico', sku: 'TEC-019', price: 380000, stock: 67, max: 100, cat: 'Accesorios' },
            { name: 'Mouse Inalambrico', sku: 'MSE-005', price: 150000, stock: 8, max: 150, cat: 'Accesorios' },
            { name: 'Monitor 27" 4K', sku: 'MON-002', price: 2100000, stock: 22, max: 50, cat: 'Electronica' },
            { name: 'Cable USB-C 2m', sku: 'CBL-041', price: 35000, stock: 500, max: 500, cat: 'Accesorios' },
            { name: 'Tablet Pro 12"', sku: 'TBL-008', price: 2800000, stock: 15, max: 40, cat: 'Electronica' },
            { name: 'Webcam HD', sku: 'WBC-011', price: 180000, stock: 0, max: 60, cat: 'Accesorios' },
            { name: 'Impresora Laser', sku: 'IMP-004', price: 1500000, stock: 5, max: 20, cat: 'Perifericos' },
            { name: 'SSD 1TB NVMe', sku: 'SSD-022', price: 420000, stock: 89, max: 200, cat: 'Componentes' },
            { name: 'RAM 16GB DDR5', sku: 'RAM-015', price: 280000, stock: 34, max: 100, cat: 'Componentes' },
            { name: 'Fuente 750W', sku: 'FNT-009', price: 350000, stock: 0, max: 30, cat: 'Componentes' },
            { name: 'Gabinete ATX', sku: 'GAB-006', price: 220000, stock: 18, max: 40, cat: 'Componentes' },
            { name: 'Silla Ergonomica', sku: 'SIL-033', price: 850000, stock: 7, max: 25, cat: 'Mobiliario' },
        ];

        let currentPage = 1;
        let pageSize = 8;

        function fmt(n) { return '₲ ' + n.toLocaleString('es-PY'); }

        function getStatus(s) {
            if (s === 0) return { cls: 'status-out', label: 'Sin stock' };
            if (s <= 10) return { cls: 'status-low', label: 'Stock bajo' };
            return { cls: 'status-active', label: 'Activo' };
        }

        function getBarClass(s, m) {
            const p = s / m;
            if (p === 0 || p <= 0.15) return 'low';
            if (p <= 0.4) return 'mid';
            return 'high';
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const start = (currentPage - 1) * pageSize;
            const page = products.slice(start, start + pageSize);

            tbody.innerHTML = page.map((p, i) => {
                const st = getStatus(p.stock);
                const bc = getBarClass(p.stock, p.max);
                const bw = Math.round((p.stock / p.max) * 100);
                return `
                <tr class="row-anim" style="animation-delay:${i * 0.04}s">
                    <td>
                        <div class="product-info">
                            <span class="product-name">${p.name}</span>
                            <span class="product-sku">${p.sku}</span>
                        </div>
                    </td>
                    <td><span class="price">${fmt(p.price)}</span></td>
                    <td>
                        <div class="stock-bar">
                            <div class="stock-bar-track"><div class="stock-bar-fill ${bc}" style="width:${bw}%"></div></div>
                            <span class="stock-num">${p.stock}</span>
                        </div>
                    </td>
                    <td><span class="status-badge ${st.cls}">${st.label}</span></td>
                    <td style="color:var(--dark-text-muted)">${p.cat}</td>
                    <td>
                        <div class="row-actions">
                            <button class="row-action-btn" title="Ver"><i class="fas fa-eye"></i></button>
                            <button class="row-action-btn" title="Editar"><i class="fas fa-pen"></i></button>
                            <button class="row-action-btn" title="Eliminar"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </td>
                </tr>`;
            }).join('');

            const end = Math.min(start + pageSize, products.length);
            document.getElementById('paginationInfo').innerHTML =
                `Mostrando <span>${start + 1}-${end}</span> de <span>${products.length}</span>`;
            renderPagination();
        }

        function renderPagination() {
            const total = Math.ceil(products.length / pageSize);
            const pag = document.getElementById('pagination');
            let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;
            for (let i = 1; i <= total; i++) {
                if (total > 7) {
                    if (i === 1 || i === total || (i >= currentPage - 1 && i <= currentPage + 1)) {
                        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
                    } else if (i === currentPage - 2 || i === currentPage + 2) {
                        html += `<span style="color:var(--dark-text-muted);padding:0 4px;">...</span>`;
                    }
                } else {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
                }
            }
            html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === total ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
            pag.innerHTML = html;
        }

        function goPage(p) {
            const total = Math.ceil(products.length / pageSize);
            if (p < 1 || p > total) return;
            currentPage = p;
            renderTable();
        }

        function changePageSize() {
            pageSize = parseInt(document.getElementById('pageSize').value);
            currentPage = 1;
            renderTable();
        }

        function toggleSub(btn) {
            const isOpen = btn.classList.contains('expanded');
            const sub = btn.nextElementSibling;
            document.querySelectorAll('.nav-item.expanded').forEach(el => {
                if (el !== btn) {
                    el.classList.remove('expanded');
                    const s = el.nextElementSibling;
                    if (s && s.classList.contains('nav-sub')) s.classList.remove('open');
                }
            });
            btn.classList.toggle('expanded', !isOpen);
            if (sub) sub.classList.toggle('open', !isOpen);
        }

        function navTo(el, e) {
            e.preventDefault();
            document.querySelectorAll('.nav-item.active, .nav-sub-item.active').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            const label = el.querySelector('.nav-label, span:last-child');
            if (label) document.getElementById('navbarTitle').textContent = label.textContent;
            if (window.innerWidth <= 768) closeSidebar();
        }

        function setFilter(el) {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('theme-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar.classList.contains('open')) { closeSidebar(); return; }
            sidebar.classList.add('open');
            overlay.style.display = 'block';
            requestAnimationFrame(() => overlay.classList.add('visible'));
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            const overlay = document.getElementById('sidebarOverlay');
            overlay.classList.remove('visible');
            setTimeout(() => overlay.style.display = 'none', 250);
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            requestAnimationFrame(() => { t.style.transform = 'translateX(0)'; t.style.opacity = '1'; });
            setTimeout(() => { t.style.transform = 'translateX(120%)'; t.style.opacity = '0'; setTimeout(() => t.remove(), 350); }, 2500);
        }

        renderTable();
    </script>
</body>
</html>
